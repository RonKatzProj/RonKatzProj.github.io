<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p-Norm Unit Ball Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-2xl bg-gray-800 p-6 rounded-2xl shadow-xl border border-gray-700">
        <header class="text-center mb-4">
            <h1 class="text-2xl font-bold mb-1 text-indigo-400">The p-Norm Unit Ball Morphing Simulator</h1>
            <p class="text-sm text-gray-400">Drag the vector tip or use inputs to calculate its p-norm</p>
        </header>

        <div class="relative h-96 w-full mb-4 bg-gray-950 rounded-xl p-2 select-none">
            <canvas id="normChart"></canvas>
        </div>

        <div class="bg-gray-900 border border-gray-700 rounded-xl p-4 mb-4 flex justify-between items-center">
            <div class="flex space-x-4 items-center">
                <span class="text-sm font-semibold text-gray-400">Vector v:</span>
                <div class="flex items-center space-x-1">
                    <span class="text-xs text-gray-500">x:</span>
                    <input type="number" id="v-x-input" step="0.01" class="vector-input">
                </div>
                <div class="flex items-center space-x-1">
                    <span class="text-xs text-gray-500">y:</span>
                    <input type="number" id="v-y-input" step="0.01" class="vector-input">
                </div>
            </div>
            <div class="text-right">
                <span class="text-xs text-gray-400 block uppercase tracking-wider font-semibold">Current Norm Value</span>
                <span id="norm-calc-display" class="text-xl font-bold text-emerald-400">1.0000</span>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between items-center">
                <label for="p-slider" class="text-sm font-medium text-gray-300">
                    Value of p: <span id="p-val" class="text-indigo-400 font-bold text-lg">2.00</span>
                </label>
                <span id="norm-type" class="text-xs font-semibold px-2 py-1 rounded bg-indigo-900 text-indigo-200">
                    Euclidean Norm
                </span>
            </div>
            
            <input 
                type="range" 
                id="p-slider" 
                min="0.5" 
                max="10" 
                step="0.05" 
                value="2" 
                class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-indigo-500"
            >

            <div class="flex justify-between text-xs px-1 gap-2">
                <button onclick="snapToP(0.5)" class="preset-btn">p = 0.5 (Non-convex)</button>
                <button onclick="snapToP(1)" class="preset-btn">p = 1 (Manhattan)</button>
                <button onclick="snapToP(2)" class="preset-btn">p = 2 (Euclidean)</button>
                <button onclick="snapToP(10)" class="preset-btn">p → ∞ (Max Norm)</button>
            </div>
        </div>
    </div>

    <script src="simulator.js"></script>
</body>
</html>
